<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <title>Login Page</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-4 text-center">Login</h1>
        <img src="/images/key.jpg" alt="Imagen descriptiva" class="rounded-circle mt-3 img-custom mb-3 d-block mx-auto" width="150" height="150">
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control rounded-pill" id="email" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" class="form-control rounded-pill" id="password" name="password" required>
            </div>
            <div class="d-flex justify-content-center">
                <button type="submit" class="btn btn-custom rounded-pill mx-2  btnlg">Login</button>
            </div>
            
        </form>
        <div class="d-flex justify-content-center">
              <!-- BotÃ³n para regresar a la pÃ¡gina anterior -->
        <button class="btn btn-custom rounded-pill mx-2  btnlg mt-4" onclick="history.back()">Regresar</button>
        </div>
      
    </div>
</body>
</html>
