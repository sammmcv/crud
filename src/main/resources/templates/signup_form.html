<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="ISO-8859-1">
	<title>Sign Up - CodeJava</title>
	<link rel="stylesheet" type="text/css" href="/webjars/bootstrap/css/bootstrap.min.css" />
	<script type="text/javascript" src="/webjars/jquery/jquery.min.js"></script>
	<script type="text/javascript" src="/webjars/bootstrap/js/bootstrap.min.js"></script>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<div class="container text-center">
		<div>
			<h1 class="mt-4 ">User Registration - Sign Up</h1>
			<img src="/images/form.jpg" alt="Imagen descriptiva" class="rounded-circle mt-3 img-custom" width="150" height="150">
		</div>
		<form th:action="@{/process_register}" th:object="${user}" 
			method="post" style="max-width: 600px; margin: 0 auto;">
		<div class="m-3">
			<div class="form-group row">
				<label class="col-4 col-form-label">E-mail: </label>
				<div class="col-8">
					<input type="email" th:field="*{email}" class="form-control inpt-lg rounded-pill" required />
				</div>
			</div>
			
			<div class="form-group row">
				<label class="col-4 col-form-label">Password: </label>
				<div class="col-8">
					<input type="password" th:field="*{password}" class="form-control inpt-lg rounded-pill" 
							required minlength="6" maxlength="10"/>
				</div>
			</div>
			
			<div class="form-group row">
				<label class="col-4 col-form-label">First Name: </label>
				<div class="col-8">
					<input type="text" th:field="*{firstName}" class="form-control inpt-lg rounded-pill " 
							required minlength="2" maxlength="20"/>
				</div>
			</div>
			
			<div class="form-group row">
				<label class="col-4 col-form-label">Last Name: </label>
				<div class="col-8">
					<input type="text" th:field="*{lastName}" class="form-control  inpt-lg rounded-pill" 
							required minlength="2" maxlength="20" />
				</div>
			</div>
			
			<div>
				<button type="submit" class="btn btn-custom rounded-pill mx-2  btnlg ">Sign Up</button> 
			</div>
		</div>
		</form>
		<!-- BotÃ³n para regresar a la pÃ¡gina anterior -->
        <button class="btn btn-custom rounded-pill mx-2  btnlg " onclick="history.back()">Regresar</button>
	</div>
</body>
</html>
